name: FeltWords
options:
  bundleIdPrefix: com.mima
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Base.xcconfig
  Release: Config/Base.xcconfig
targets:
  FeltWords:
    type: application
    platform: iOS
    sources:
      - FeltWords
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mima.feltwords
        PRODUCT_NAME: 毛毛英语绘本
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FeltWords/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        DEVELOPMENT_ASSET_PATHS: ""
